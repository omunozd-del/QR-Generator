<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de QR - GitHub Pages</title>
    
    <!-- CORRECCIÓN: Librería QRCode.js desde un CDN real -->
    <script src="https://cloudflare.com"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; background-color: #f0f2f5; margin: 0; }
        .container { background: white; padding: 2.5rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; }
        input { padding: 12px; width: 90%; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 15px; font-size: 16px; }
        button { padding: 12px 25px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; width: 100%; margin-bottom: 10px; }
        #qrcode { margin: 25px 0; display: flex; justify-content: center; min-height: 200px; background: #fafafa; padding: 10px; border-radius: 10px; }
        #downloadBtn { background-color: #28a745; display: none; }
        canvas { display: none; } /* Ocultamos el canvas para que no se duplique con la img */
    </style>
</head>
<body>

<div class="container">
    <h2>Generador de QR</h2>
    <input type="text" id="urlInput" placeholder="Pega tu enlace aquí...">
    <button onclick="generarQR()">Generar Código</button>
    <div id="qrcode"></div>
    <button id="downloadBtn" onclick="descargarQR()">Descargar Imagen PNG</button>
</div>

<script>
    const qrcodeContainer = document.getElementById("qrcode");
    const downloadBtn = document.getElementById("downloadBtn");

    function generarQR() {
        const url = document.getElementById("urlInput").value.trim();
        if (!url) { alert("Introduce una URL"); return; }

        qrcodeContainer.innerHTML = "";
        
        // Generar QR
        new QRCode(qrcodeContainer, {
            text: url,
            width: 200,
            height: 200,
            correctLevel : QRCode.CorrectLevel.H
        });

        setTimeout(() => { downloadBtn.style.display = "block"; }, 300);
    }

    function descargarQR() {
        const img = qrcodeContainer.querySelector("img");
        const canvas = qrcodeContainer.querySelector("canvas");
        
        // Preferimos el canvas para la descarga directa
        const imageSrc = canvas ? canvas.toDataURL("image/png") : img.src;

        const link = document.createElement("a");
        link.href = imageSrc;
        link.download = "codigo_qr.png";
        link.click();
    }
</script>
</body>
</html>
